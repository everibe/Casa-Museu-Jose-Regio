<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realidade Aumentada - Régio Quest</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100%; height: 100%; }
        
        /* Forçar o overlay a ocupar o ecrã inteiro e empurrar o conteúdo para baixo */
        .ar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* Caixa de Diálogo colada estritamente ao fundo da página (Aba Ocre) */
        .ar-bottom {
            width: 100%;
            padding: 0;
            margin: 0;
            pointer-events: auto;
        }

        .ar-dialog {
            width: 100%;
            min-height: 220px;
            background: #DDA128; /* Tom ocre exato da imagem */
            border-radius: 32px 32px 0 0; /* Bordas arredondadas apenas no topo */
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            border: none;
        }

        .ar-dialog-text {
            color: #FFFFFF;
            font-size: 16px;
            line-height: 1.5;
            text-align: left;
            margin: 0 0 20px 0;
            font-weight: 500;
        }

        /* Botões de Navegação com Círculo Branco do Figma */
        .nav-buttons-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            pointer-events: auto;
        }

        .btn-nav-circle {
            background: #FFFDF9;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
        }
        .btn-nav-circle:active { transform: scale(0.9); }
        .btn-nav-circle svg { width: 28px; height: 28px; fill: #DDA128; }
        .btn-nav-circle:disabled { opacity: 0; pointer-events: none; }

        /* Botão Próxima Sala Vermelho Isolado (Tela 10) */
        .ar-next-btn-red {
            display: none;
            background: #B31A1A;
            color: #FFFFFF;
            border: none;
            padding: 16px 0;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 25px;
            width: 85%;
            text-align: center;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            box-shadow: 0 4px 15px rgba(179,26,26,0.4);
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <audio id="audio-1" src="Narrativas-Audios/1 Hall de entrada 1.mp3"></audio>
    <audio id="audio-2" src="Narrativas-Audios/1 Hall de entrada 2.mp3"></audio>
    <audio id="audio-3" src="Narrativas-Audios/1 Hall de entrada 3.mp3"></audio>

    <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false">
        
        <a-marker preset="hiro">
            
            <a-image id="ar-regio-avatar" src="Icones/jose-regio.png" position="0 0.8 0" width="1.6" height="2.2" visible="true"></a-image>
            
            <a-image id="ar-pegadas" src="Icones/pegadas.png" position="0 0.02 0.3" rotation="-90 0 0" width="1.8" height="1.8" visible="false"></a-image>
            
        </a-marker>
        
        <a-camera id="ar-camera" gps-camera rotation-reader></a-camera>
    </a-scene>

    <div class="ar-overlay" id="ar-overlay">

        <div class="ar-progress-bar" id="ar-progress-bar" style="pointer-events: auto;">
            <div class="ar-progress-segment filled"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
        </div>

        <div class="ar-bottom" id="ar-bottom">
            <div class="ar-dialog" id="ar-dialog">
                
                <p class="ar-dialog-text" id="ar-dialog-text"></p>
                
                <div class="nav-buttons-container" id="nav-buttons-zone">
                    <button class="btn-nav-circle" id="btn-prev-dialog" aria-label="Voltar">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
                        </svg>
                    </button>

                    <button class="btn-nav-circle" id="btn-next-dialog" aria-label="Avançar">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <button class="ar-next-btn-red" id="btn-proxima-sala" onclick="concluirSala()">
        Próxima Sala
    </button>

    <script>
        const dialogues = [
            { text: "Deixei algo escondido nesta casa antes de partir. Nunca contei a ninguém. Se encontrares tudo, podes ficar com o segredo.", audioId: "audio-1", showRegio: true, showPegadas: false, isFinal: false },
            { text: "O edifício tem séculos de história. Foi convento, quartel de guerra e pensão.", audioId: "audio-2", showRegio: true, showPegadas: false, isFinal: false },
            { text: "Quando eu cheguei a Portalegre como professor, aluguei um quarto modesto, e fui ficando. Ao longo dos anos ocupei mais divisões, até me tornar o único hóspede da casa.", audioId: "audio-3", showRegio: true, showPegadas: false, isFinal: false },
            { text: "", audioId: null, showRegio: false, showPegadas: true, isFinal: true } // Tela 10: Sem aba ocre, só pegadas AR e botão vermelho
        ];

        const segments = document.querySelectorAll('.ar-progress-segment');
        const dialogText = document.getElementById('ar-dialog-text');
        const btnPrev = document.getElementById('btn-prev-dialog');
        const btnNext = document.getElementById('btn-next-dialog');
        const btnProxima = document.getElementById('btn-proxima-sala');
        const overlayInterface = document.getElementById('ar-overlay');
        
        // Entidades AR
        const arRegio = document.getElementById('ar-regio-avatar');
        const arPegadas = document.getElementById('ar-pegadas');

        let currentStep = 0;

        function pararTodosAudios() {
            ['audio-1', 'audio-2', 'audio-3'].forEach(id => {
                const a = document.getElementById(id);
                if (a) { a.pause(); a.currentTime = 0; }
            });
        }

        function updateUI() {
            const current = dialogues[currentStep];

            if (current.isFinal) {
                overlayInterface.style.display = 'none'; // Esconde a interface ocre e barra superior
                btnProxima.style.display = 'block';     // Torna visível o botão vermelho
            } else {
                overlayInterface.style.display = 'flex';
                dialogText.textContent = current.text;
                btnProxima.style.display = 'none';
            }

            // Gerir botões de navegação
            btnPrev.disabled = (currentStep === 0);

            // Atualizar barra de progresso
            segments.forEach((seg, i) => {
                seg.classList.toggle('filled', i <= currentStep);
            });

            // Gerir visibilidade AR
            arRegio.setAttribute('visible', current.showRegio);
            arPegadas.setAttribute('visible', current.showPegadas);

            // Sincronizar Áudios
            pararTodosAudios();
            if (current.audioId) {
                const som = document.getElementById(current.audioId);
                if (som) {
                    som.play().catch(e => console.log("Áudio aguardando clique de interação."));
                }
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentStep < dialogues.length - 1) {
                currentStep++;
                updateUI();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        });

        function concluirSala() {
            localStorage.setItem('hallConcluido', 'true');
            window.location.href = "jornada-cristos.html";
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateUI();
        });
    </script>
</body>
</html>
