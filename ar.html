<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realidade Aumentada - Régio Quest</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        
        /* Botões de Navegação Duplos (Esquerda e Direita) */
        .nav-buttons-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        .btn-nav-arrow {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nav-arrow svg {
            width: 32px;
            height: 32px;
            fill: #D4AF37;
        }
        .btn-nav-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Ajuste do Avatar conforme as Telas 7, 8, 9 e 10 */
        .ar-avatar {
            width: 100px;
            height: auto;
            bottom: 20px;
            left: 15px;
            z-index: 15;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <audio id="audio-1" src="Narrativas-Audios/1 Hall de entrada 1.mp3"></audio>
    <audio id="audio-2" src="Narrativas-Audios/1 Hall de entrada 2.mp3"></audio>
    <audio id="audio-3" src="Narrativas-Audios/1 Hall de entrada 3.mp3"></audio>

    <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false">
        <a-marker preset="hiro">
            <a-box position="0 0.5 0" material="color: #d4af37; opacity: 0.8;"></a-box>
        </a-marker>
        <a-camera id="ar-camera" gps-camera rotation-reader></a-camera>
    </a-scene>

    <div class="ar-overlay" id="ar-overlay">

        <div class="ar-progress-bar" id="ar-progress-bar">
            <div class="ar-progress-segment filled"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
        </div>

        <div class="ar-bottom" id="ar-bottom">
            <img src="Icones/jose-regio.png" alt="José Régio" class="ar-avatar" id="ar-avatar">

            <div class="ar-dialog" id="ar-dialog" style="flex-direction: column;">
                
                <p class="ar-dialog-text" id="ar-dialog-text" style="width: 100%; margin: 0;"></p>
                
                <div class="nav-buttons-container" id="nav-buttons-zone">
                    <button class="btn-nav-arrow" id="btn-prev-dialog" aria-label="Voltar">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
                        </svg>
                    </button>

                    <button class="btn-nav-arrow" id="btn-next-dialog" aria-label="Avançar">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                        </svg>
                    </button>
                </div>

                <button class="ar-next-btn" id="btn-proxima-sala" onclick="concluirSala()" style="position: relative; margin-top: 10px; width: 100%;">
                    Próxima Sala
                </button>

            </div>
        </div>
    </div>

    <script>
        // Configuração exata das Telas 7, 8, 9 e 10
        const dialogues = [
            { text: "Deixei algo escondido nesta casa antes de partir. Nunca contei a ninguém. Se encontrares tudo, podes ficar com o segredo.", audioId: "audio-1", isFinal: false },
            { text: "O edifício tem séculos de história. Foi convento, quartel de guerra e pensão.", audioId: "audio-2", isFinal: false },
            { text: "Quando eu cheguei a Portalegre como professor, aluguei um quarto modesto, e fui ficando. Ao longo dos anos ocupei mais divisões, até me tornar o único hóspede da casa.", audioId: "audio-3", isFinal: false },
            { text: "", audioId: null, isFinal: true } // Tela 10: Sem texto, apenas botão
        ];

        const segments = document.querySelectorAll('.ar-progress-segment');
        const dialogText = document.getElementById('ar-dialog-text');
        const btnPrev = document.getElementById('btn-prev-dialog');
        const btnNext = document.getElementById('btn-next-dialog');
        const btnProxima = document.getElementById('btn-proxima-sala');

        let currentStep = 0;

        function pararTodosAudios() {
            ['audio-1', 'audio-2', 'audio-3'].forEach(id => {
                const a = document.getElementById(id);
                if (a) { a.pause(); a.currentTime = 0; }
            });
        }

        function updateUI() {
            const current = dialogues[currentStep];

            // 1. Atualizar Texto ou ocultar para a Tela 10
            if (current.isFinal) {
                dialogText.style.display = 'none';
                document.getElementById('nav-buttons-zone').style.display = 'none';
                btnProxima.style.display = 'block';
            } else {
                dialogText.style.display = 'block';
                dialogText.textContent = current.text;
                document.getElementById('nav-buttons-zone').style.display = 'flex';
                btnProxima.style.display = 'none';
            }

            // 2. Controlar ativação dos botões de navegação
            btnPrev.disabled = (currentStep === 0);

            // 3. Atualizar a Barra de Progresso Superior
            segments.forEach((seg, i) => {
                seg.classList.toggle('filled', i <= currentStep);
            });

            // 4. Gestão e Sincronização do Áudio
            pararTodosAudios();
            if (current.audioId) {
                const som = document.getElementById(current.audioId);
                if (som) {
                    som.play().catch(e => console.log("Áudio aguardando clique: ", e));
                }
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentStep < dialogues.length - 1) {
                currentStep++;
                updateUI();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        });

        // Função do Botão "Próxima Sala" (Tela 10)
        function concluirSala() {
            // Salva no navegador que o Hall foi feito!
            localStorage.setItem('hallConcluido', 'true');
            // Redireciona de volta para o mapa da jornada
            window.location.href = "jornada.html";
        }

        // Inicializar a página
        window.addEventListener('DOMContentLoaded', () => {
            updateUI();
        });
    </script>
</body>
</html>
