<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Régio Quest - Casa-Museu José Régio</title>
    <!-- Link para as regras visuais externas -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Parte Superior: Título -->
        <header class="header-section">
            <h1 class="title-brand" id="main-title">
                <span class="small-title">Casa-Museu</span>
                <span class="large-title">José<br>Régio</span>
            </h1>
        </header>

        <!-- Parte Central: Texto de apoio -->
        <main class="center-section">
            <p class="subtitle" id="onboarding-text">
                Explore a Casa-Museu José Régio com curiosidades e quizzes!
            </p>
        </main>

        <!-- Parte Inferior: Botões empilhados -->
        <footer class="footer-section">
            <div class="button-group">
                <!-- Botão LOGIN envolvido por uma tag de link a apontar para login.html -->
                <a href="login.html" class="btn btn-secondary" id="btn-login">
                    Login
                </a>
                
                <!-- Botão REGISTRAR -->
                <a href="registrar.html" class="btn btn-secondary" id="btn-registrar">
                    Registrar
                </a>
            </div>
        </footer>
    </div>

</body>
</html>
