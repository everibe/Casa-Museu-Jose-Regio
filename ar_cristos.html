<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sala dos Cristos - Régio Quest</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mayognaise/aframe-gif-shader@master/dist/aframe-gif-shader.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100%; height: 100%; }
        
        .ar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .ar-bottom {
            width: 100%;
            padding: 0;
            margin: 0;
            pointer-events: auto;
        }

        .ar-dialog {
            width: 100%;
            min-height: 220px;
            background: #DDA128; 
            border-radius: 32px 32px 0 0;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            border: none;
            transition: background-color 0.4s ease, min-height 0.4s ease; 
        }

        .ar-dialog-text {
            color: #FFFFFF;
            font-size: 16px;
            line-height: 1.5;
            text-align: left;
            margin: 0 0 20px 0;
            font-weight: 500;
        }

        .cross-container {
            display: none;
            background: #FFFDF9;
            border-radius: 16px;
            padding: 15px;
            margin: 0 auto 20px auto;
            text-align: center;
            width: 140px;
            height: 140px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .cross-container img { height: 100%; object-fit: contain; }

        .quiz-container { 
            display: none; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%; 
            margin-bottom: 20px; 
        }

        .quiz-option { 
            background: #FFFDF9; 
            border: 2px solid transparent; 
            color: #333333; 
            padding: 14px 16px; 
            border-radius: 30px; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        
        .quiz-option:active { transform: scale(0.98); }

        .feedback-explanation {
            background: #FFFDF9;
            color: #333333;
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            line-height: 1.4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .nav-buttons-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .btn-nav-circle {
            background: #FFFDF9;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
        }
        .btn-nav-circle:active { transform: scale(0.9); }
        .btn-nav-circle svg { width: 28px; height: 28px; fill: #DDA128; transition: fill 0.4s ease; }
        .btn-nav-circle:disabled { opacity: 0; pointer-events: none; }

        .ar-next-btn-red {
            display: none;
            background: #B31A1A;
            color: #FFFFFF;
            border: none;
            padding: 16px 0;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 25px;
            width: 85%;
            text-align: center;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            box-shadow: 0 4px 15px rgba(179,26,26,0.4);
            cursor: pointer;
            text-decoration: none;
        }

        .html-pegadas-screen {
            display: none;
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) perspective(500px) rotateX(60deg); 
            width: 200px;
            z-index: 5;
            pointer-events: none;
            opacity: 0.8; 
        }

        #ar-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #DDA128;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFFDF9;
        }
        .ar-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 253, 249, 0.3);
            border-top: 6px solid #FFFDF9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #ar-loading p {
            font-size: 18px;
            font-family: Arial, sans-serif;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="ar-loading">
        <div class="ar-spinner"></div>
        <p>A preparar a sala...</p>
    </div>

    <audio id="audio-cristos-1" src="Narrativas-Audios/2 Sala dos cristos 1.mp3"></audio>
    <audio id="audio-cristos-2" src="Narrativas-Audios/2 Sala dos cristos 2.mp3"></audio>
    <audio id="audio-cristos-3" src="Narrativas-Audios/2 Sala dos cristos 3.mp3"></audio>
    <audio id="audio-cristos-4" src="Narrativas-Audios/2 Sala dos cristos 4.mp3"></audio>
    <audio id="audio-cristos-5" src="Narrativas-Audios/2 Sala dos cristos 5.mp3"></audio>

    <img id="html-pegadas" class="html-pegadas-screen" src="Elementos-AR/pegadas.gif" alt="Pegadas de transição">

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: Elementos-AR/target.mind; uiLoading: #ar-loading;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="ar-regio-avatar" 
                     src="Elementos-AR/jose-regio.png" 
                     position="0 0.2 0.1" 
                     width="1.5" 
                     height="2.1" 
                     visible="false">
            </a-image>

            <a-image id="ar-cristo-1" 
                     src="Elementos-AR/cristo1.png" 
                     position="0 0.2 0.1" 
                     width="1.2" 
                     height="2.2" 
                     visible="false">
            </a-image>

            <a-image id="ar-cristo-2" 
                     src="Elementos-AR/cristo2.png" 
                     position="0 0.2 0.1" 
                     width="1.2" 
                     height="2.2" 
                     visible="false">
            </a-image>
        </a-entity>
        
    </a-scene>

    <div class="ar-overlay" id="ar-overlay">

        <div class="ar-progress-bar" id="ar-progress-bar" style="pointer-events: auto; padding: 20px;">
            <div class="ar-progress-segment filled"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
        </div>

        <div class="ar-bottom" id="ar-bottom">
            <div class="ar-dialog" id="ar-dialog">
                
                <div id="cross-image-container" class="cross-container">
                    <img id="cross-image" src="" alt="Cristo de Madeira" onerror="this.style.display='none'">
                </div>

                <p class="ar-dialog-text" id="ar-dialog-text"></p>
                
                <div class="quiz-container" id="quiz-options-zone"></div>
                
                <div class="nav-buttons-container" id="nav-buttons-zone">
                    <button class="btn-nav-circle" id="btn-prev-dialog" aria-label="Voltar">
                        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                    </button>

                    <button class="btn-nav-circle" id="btn-next-dialog" aria-label="Avançar">
                        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <button class="ar-next-btn-red" id="btn-proxima-sala" onclick="concluirSala()">
        Próxima Sala
    </button>

    <script>
        const telasFluxo = [
            // 1ª Fala: Régio = FALSO, Cristo 1 em AR = VERDADEIRO, UI da interface = FALSO
            { text: "Fiz por ele o que nunca faria por uma obra de arte de museum, tratei-o como se fosse vivo.", dialogBg: "#DDA128", showRegio: false, showArCristo1: true, showArCristo2: false, showCrossUI: false, state: "text", audioId: "audio-cristos-1" },
            // 2ª Fala: Régio = FALSO, Cristo 2 em AR = VERDADEIRO, UI da interface = FALSO
            { text: "Eu colecionei mais de 400 figuras de Cristo, a maioria em madeira. Esses Cristos possuíam uma simbologia de proteção do lar e na minha época, era costume dá-los de presente em momentos especiais da vida.", dialogBg: "#DDA128", showRegio: false, showArCristo1: false, showArCristo2: true, showCrossUI: false, state: "text", audioId: "audio-cristos-2" },
            // Quiz: Tudo em AR desaparece, a imagem aparece apenas na caixinha da interface (showCrossUI: true)
            { 
                text: "Para que serviam originalmente os Cristos de madeira no Alentejo?", 
                dialogBg: "#A64B2A", 
                showRegio: false, showArCristo1: false, showArCristo2: false, showCrossUI: true, crossImg: "Elementos-AR/cristo2.png", state: "quiz", audioId: "audio-cristos-4",
                options: ["Decoração de igrejas", "Enxoval das noivas", "Oferendas fúnebres", "Amuletos de viagem"],
                correctIndex: 1
            },
            // Feedback do Quiz: Tudo em AR escondido, imagem na caixinha
            { 
                text: "Os Cristos faziam parte do enxoval das noivas no Alentejo e eram oferecidos no casamento como proteção do lar.", 
                dialogBg: "#8B8237", 
                showRegio: false, showArCristo1: false, showArCristo2: false, showCrossUI: true, crossImg: "Elementos-AR/cristo3.png", state: "feedback", audioId: "audio-cristos-5"
            },
            // Fala Final: O Régio volta em AR para a despedida
            { text: "O homem que me vendeu este Cristo tinha fome. Fui à cozinha buscar-lhe algo.", dialogBg: "#DDA128", showRegio: true, showArCristo1: false, showArCristo2: false, showCrossUI: false, state: "text", audioId: "audio-cristos-3" },
            // Final
            { text: "", state: "final", showRegio: false, showArCristo1: false, showArCristo2: false, showCrossUI: false, audioId: null }
        ];

        const segments = document.querySelectorAll('.ar-progress-segment');
        const dialogText = document.getElementById('ar-dialog-text');
        const quizZone   = document.getElementById('quiz-options-zone');
        const navZone    = document.getElementById('nav-buttons-zone');
        const btnPrev    = document.getElementById('btn-prev-dialog');
        const btnNext    = document.getElementById('btn-next-dialog');
        const btnProxima = document.getElementById('btn-proxima-sala');
        const overlayInterface = document.getElementById('ar-overlay');
        const arDialog = document.getElementById('ar-dialog');
        const crossContainer = document.getElementById('cross-image-container');
        const crossImg = document.getElementById('cross-image');
        const htmlPegadas = document.getElementById('html-pegadas');
        
        const arRegio = document.getElementById('ar-regio-avatar');
        const arCristo1 = document.getElementById('ar-cristo-1');
        const arCristo2 = document.getElementById('ar-cristo-2');

        let currentStep = 0;

        function pararTodosAudios() {
            ['audio-cristos-1', 'audio-cristos-2', 'audio-cristos-3', 'audio-cristos-4', 'audio-cristos-5'].forEach(id => {
                const a = document.getElementById(id);
                if (a) { 
                    a.pause(); 
                    a.currentTime = 0; 
                }
            });
        }

        function updateUI() {
            const data = telasFluxo[currentStep];

            segments.forEach((seg, i) => seg.classList.toggle('filled', i <= currentStep));

            pararTodosAudios();
            if (data.audioId) {
                const som = document.getElementById(data.audioId);
                if (som) {
                    som.play().catch(e => console.log("Áudio aguardando clique de interação."));
                }
            }

            if (data.state === "final") {
                overlayInterface.style.display = 'none';
                btnProxima.style.display = 'block';
                arRegio.setAttribute('visible', 'false');
                arCristo1.setAttribute('visible', 'false');
                arCristo2.setAttribute('visible', 'false');
                htmlPegadas.style.display = 'block'; 
                return;
            } else {
                htmlPegadas.style.display = 'none'; 
            }

            overlayInterface.style.display = 'flex';
            btnProxima.style.display = 'none';
            
            // Controle dos elementos AR 3D
            arRegio.setAttribute('visible', data.showRegio ? 'true' : 'false');
            arCristo1.setAttribute('visible', data.showArCristo1 ? 'true' : 'false');
            arCristo2.setAttribute('visible', data.showArCristo2 ? 'true' : 'false');

            arDialog.style.backgroundColor = data.dialogBg;
            
            // Controle da imagem na interface amarela (para o quiz)
            if (data.showCrossUI) {
                crossContainer.style.display = 'block';
                crossImg.style.display = 'block';
                crossImg.src = data.crossImg;
            } else {
                crossContainer.style.display = 'none';
            }
            
            const svgs = document.querySelectorAll('.btn-nav-circle svg');
            svgs.forEach(svg => svg.style.fill = data.dialogBg);

            quizZone.innerHTML = "";
            quizZone.style.display = "none";
            btnPrev.disabled = (currentStep === 0);

            if (data.state === "quiz") {
                dialogText.textContent = data.text;
                dialogText.style.textAlign = "center";
                navZone.style.display = 'none'; 
                quizZone.style.display = "flex";

                data.options.forEach((opcao, idx) => {
                    const button = document.createElement('button');
                    button.className = "quiz-option";
                    button.textContent = opcao;
                    button.onclick = () => {
                        if (idx === data.correctIndex) {
                            currentStep++;
                            updateUI();
                        } else {
                            button.style.backgroundColor = '#ffcccc';
                            button.style.color = '#cc0000';
                            setTimeout(() => {
                                button.style.backgroundColor = '#FFFDF9';
                                button.style.color = '#333333';
                            }, 500);
                        }
                    };
                    quizZone.appendChild(button);
                });

            } else if (data.state === "feedback") {
                dialogText.textContent = "Para que serviam originalmente os Cristos de madeira no Alentejo?";
                dialogText.style.textAlign = "center";
                
                const correctPill = document.createElement('div');
                correctPill.className = "quiz-option";
                correctPill.style.display = "flex";
                correctPill.style.justifyContent = "space-between";
                correctPill.style.alignItems = "center";
                correctPill.style.cursor = "default";
                correctPill.innerHTML = `Enxoval das noivas <svg width="20" height="20" viewBox="0 0 24 24" fill="#8B8237"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
                
                const explanation = document.createElement('div');
                explanation.className = "feedback-explanation";
                explanation.textContent = data.text;

                quizZone.appendChild(correctPill);
                quizZone.appendChild(explanation);
                quizZone.style.display = "flex";
                
                navZone.style.display = 'flex';
                navZone.style.justifyContent = 'center';
                btnPrev.style.display = 'none';

            } else { 
                dialogText.textContent = data.text;
                dialogText.style.textAlign = "left";
                navZone.style.display = 'flex';
                navZone.style.justifyContent = 'space-between';
                btnPrev.style.display = 'flex';
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentStep < telasFluxo.length - 1) {
                currentStep++;
                updateUI();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        });

        function concluirSala() {
            localStorage.setItem('cristosConcluido', 'true');
            window.location.href = "revelacao.html";
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateUI();
        });
    </script>
</body>
</html>
