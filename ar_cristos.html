<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sala dos Cristos - Régio Quest</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mayognaise/aframe-gif-shader@master/dist/aframe-gif-shader.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: Elementos-AR/target.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="ar-cristo1" src="Elementos-AR/cristo1.png" position="0 0.2 0.1" width="1.2" height="1.2" visible="false"></a-image>
            <a-image id="ar-cristo2" src="Elementos-AR/cristo2.png" position="0 0.2 0.1" width="1.2" height="1.2" visible="false"></a-image>
            
            <a-entity id="ar-pegadas" 
                      geometry="primitive: plane; width: 1.8; height: 1.8" 
                      material="shader: gif; src: url(Elementos-AR/pegadas.gif); transparent: true" 
                      position="0 -0.5 0.1" 
                      visible="false">
            </a-entity>
        </a-entity>
    </a-scene>

    <div class="ar-overlay" id="ar-overlay">
        <div class="ar-bottom" id="ar-bottom">
            <div class="ar-dialog" id="ar-dialog">
                <p class="ar-dialog-text" id="ar-dialog-text"></p>
                <div class="quiz-container" id="quiz-options-zone"></div>
            </div>
        </div>
    </div>

    <button class="ar-next-btn-red" id="btn-proxima-sala" onclick="concluirSala()" style="display: none;">
        Próxima Sala
    </button>

    <script>
        // LÓGICA DE CONTROLE
        const telasFluxo = [
            { text: "Fiz por ele o que nunca faria por uma obra de arte de museu, tratei-o como se fosse vivo.", showC1: true, showC2: false, showP: false },
            { text: "Eu colecionei mais de 400 figuras de Cristo. Esses Cristos possuíam uma simbologia de proteção do lar.", showC1: false, showC2: true, showP: false },
            { text: "Para que serviam originalmente os Cristos de madeira no Alentejo?", showC1: false, showC2: false, showP: false, isQuiz: true },
            { text: "", showC1: false, showC2: false, showP: true, isFinal: true }
        ];

        let currentStep = 0;

        function updateUI() {
            const data = telasFluxo[currentStep];
            
            // Atualiza AR
            document.getElementById('ar-cristo1').setAttribute('visible', data.showC1);
            document.getElementById('ar-cristo2').setAttribute('visible', data.showC2);
            document.getElementById('ar-pegadas').setAttribute('visible', data.showP);
            
            // Atualiza Texto e Interface
            document.getElementById('ar-dialog-text').textContent = data.text;
            document.getElementById('btn-proxima-sala').style.display = data.isFinal ? 'block' : 'none';
            document.getElementById('ar-overlay').style.display = data.isFinal ? 'none' : 'flex';
        }

        function concluirSala() {
            window.location.href = "revelacao.html";
        }

        // Simples navegação para testes (pode substituir pelo seu sistema de cliques)
        document.getElementById('ar-dialog').addEventListener('click', () => {
            if(currentStep < telasFluxo.length - 1) {
                currentStep++;
                updateUI();
            }
        });

        window.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
