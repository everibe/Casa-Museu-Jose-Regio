<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sala dos Cristos - Régio Quest</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mayognaise/aframe-gif-shader@master/dist/aframe-gif-shader.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100%; height: 100%; }
        .ar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .ar-bottom { width: 100%; padding: 0; margin: 0; pointer-events: auto; }
        .ar-dialog { width: 100%; min-height: 220px; background: #DDA128; border-radius: 32px 32px 0 0; padding: 30px 24px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; border: none; transition: background-color 0.4s ease, min-height 0.4s ease; }
        .ar-dialog-text { color: #FFFFFF; font-size: 16px; line-height: 1.5; text-align: left; margin: 0 0 20px 0; font-weight: 500; }
        .cross-container { display: none; background: #FFFDF9; border-radius: 16px; padding: 15px; margin: 0 auto 20px auto; text-align: center; width: 140px; height: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .cross-container img { height: 100%; object-fit: contain; }
        .quiz-container { display: none; flex-direction: column; gap: 12px; width: 100%; margin-bottom: 20px; }
        .quiz-option { background: #FFFDF9; border: 2px solid transparent; color: #333333; padding: 14px 16px; border-radius: 30px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .feedback-explanation { background: #FFFDF9; color: #333333; padding: 20px; border-radius: 16px; font-size: 14px; font-weight: 500; text-align: left; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-buttons-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .btn-nav-circle { background: #FFFDF9; border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .ar-next-btn-red { display: none; background: #B31A1A; color: #FFFFFF; border: none; padding: 16px 0; font-size: 15px; font-weight: bold; text-transform: uppercase; border-radius: 25px; width: 85%; text-align: center; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 25; cursor: pointer; }
    </style>
</head>
<body>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: Elementos-AR/target.mind;" vr-mode-ui="enabled: false">
        <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="ar-regio-avatar" src="Elementos-AR/jose-regio.png" position="0 0.2 0.1" width="1.6" height="2.2" visible="true"></a-image>
            <a-image id="ar-cristo1" src="Elementos-AR/cristo1.png" position="0 0.2 0.1" width="1.2" height="1.2" visible="false"></a-image>
            <a-image id="ar-cristo2" src="Elementos-AR/cristo2.png" position="0 0.2 0.1" width="1.2" height="1.2" visible="false"></a-image>
            <a-entity id="ar-pegadas" geometry="primitive: plane; width: 1.8; height: 1.8" material="shader: gif; src: url(Elementos-AR/pegadas.gif); transparent: true" position="0 -0.5 0.1" visible="false"></a-entity>
        </a-entity>
    </a-scene>

    <div class="ar-overlay" id="ar-overlay">
        <div class="ar-bottom">
            <div class="ar-dialog" id="ar-dialog">
                <div id="cross-image-container" class="cross-container"><img id="cross-image" src="" alt="Cristo"></div>
                <p class="ar-dialog-text" id="ar-dialog-text"></p>
                <div class="quiz-container" id="quiz-options-zone"></div>
                <div class="nav-buttons-container" id="nav-buttons-zone">
                    <button class="btn-nav-circle" id="btn-prev-dialog"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg></button>
                    <button class="btn-nav-circle" id="btn-next-dialog"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <button class="ar-next-btn-red" id="btn-proxima-sala" onclick="window.location.href='revelacao.html'">Próxima Sala</button>

    <script>
        const telasFluxo = [
            { text: "Fiz por ele o que nunca faria por uma obra de arte de museum...", showRegio: false, showCristo1: true, showCristo2: false, showPegadas: false, state: "text" },
            { text: "Eu colecionei mais de 400 figuras de Cristo...", showRegio: false, showCristo1: false, showCristo2: true, showPegadas: false, state: "text" },
            { text: "Para que serviam originalmente os Cristos?", showRegio: false, showCristo1: false, showCristo2: false, showPegadas: false, state: "quiz", options: ["Decoração", "Enxoval"], correctIndex: 1 },
            { text: "Os Cristos faziam parte do enxoval...", showRegio: false, showCristo1: false, showCristo2: false, showPegadas: false, state: "text" },
            { text: "", state: "final", showRegio: false, showCristo1: false, showCristo2: false, showPegadas: true }
        ];

        let currentStep = 0;
        const arRegio = document.getElementById('ar-regio-avatar');
        const arCristo1 = document.getElementById('ar-cristo1');
        const arCristo2 = document.getElementById('ar-cristo2');
        const arPegadas = document.getElementById('ar-pegadas');

        function updateUI() {
            const data = telasFluxo[currentStep];
            arRegio.setAttribute('visible', data.showRegio ? 'true' : 'false');
            arCristo1.setAttribute('visible', data.showCristo1 ? 'true' : 'false');
            arCristo2.setAttribute('visible', data.showCristo2 ? 'true' : 'false');
            arPegadas.setAttribute('visible', data.showPegadas ? 'true' : 'false');
            
            document.getElementById('ar-dialog-text').textContent = data.text;
            document.getElementById('ar-overlay').style.display = (data.state === "final") ? 'none' : 'flex';
            document.getElementById('btn-proxima-sala').style.display = (data.state === "final") ? 'block' : 'none';
        }

        document.getElementById('btn-next-dialog').addEventListener('click', () => { if(currentStep < telasFluxo.length-1) { currentStep++; updateUI(); } });
        document.getElementById('btn-prev-dialog').addEventListener('click', () => { if(currentStep > 0) { currentStep--; updateUI(); } });
        
        updateUI();
    </script>
</body>
</html>
