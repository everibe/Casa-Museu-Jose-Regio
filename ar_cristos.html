<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sala dos Cristos - Régio Quest</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100%; height: 100%; }
        .ar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .ar-progress-bar { pointer-events: auto; padding: 20px; display: flex; gap: 5px; }
        .ar-progress-segment { flex: 1; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; }
        .ar-progress-segment.filled { background: #FFFFFF; }
        .ar-bottom { width: 100%; padding: 0; margin: 0; pointer-events: auto; }
        .ar-dialog { width: 100%; min-height: 220px; background: #DDA128; border-radius: 32px 32px 0 0; padding: 30px 24px; box-sizing: border-box; }
        .ar-dialog-text { color: #FFFFFF; font-size: 16px; line-height: 1.5; margin: 0 0 20px 0; font-weight: 500; }
        .nav-buttons-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .btn-nav-circle { background: #FFFDF9; border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .btn-nav-circle svg { width: 28px; height: 28px; fill: #DDA128; }
        .ar-next-btn-red { display: none; background: #B31A1A; color: #FFFFFF; padding: 16px 0; font-size: 15px; font-weight: bold; border-radius: 25px; width: 85%; text-align: center; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 25; text-decoration: none; }
        .html-pegadas-screen { display: none; position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%) perspective(500px) rotateX(60deg); width: 180px; z-index: 5; opacity: 0.8; }
    </style>
</head>
<body>

    <img id="html-pegadas" class="html-pegadas-screen" src="Elementos-AR/pegadas.png" alt="Pegadas">

    <a-scene mindar-image="imageTargetSrc: Elementos-AR/target.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="ar-cristo-1" src="Elementos-AR/cristo1.png" position="0 0.1 0" width="1.2" height="2.0" visible="false"></a-image>
            <a-image id="ar-cristo-2" src="Elementos-AR/cristo2.png" position="0 0.1 0" width="1.2" height="2.0" visible="false"></a-image>
        </a-entity>
    </a-scene>

    <div class="ar-overlay" id="ar-overlay">
        <div class="ar-progress-bar">
            <div class="ar-progress-segment filled"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
            <div class="ar-progress-segment"></div>
        </div>
        <div class="ar-bottom">
            <div class="ar-dialog" id="ar-dialog">
                <p class="ar-dialog-text" id="ar-dialog-text"></p>
                <div class="nav-buttons-container" id="nav-buttons-zone">
                    <button class="btn-nav-circle" id="btn-prev-dialog"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg></button>
                    <button class="btn-nav-circle" id="btn-next-dialog"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <a href="#" class="ar-next-btn-red" id="btn-proxima-sala" onclick="concluirSala()">Próxima Sala</a>

    <script>
        const telasFluxo = [
            { text: "Fiz por ele o que nunca faria por uma obra de arte, tratei-o como se fosse vivo.", showArCristo1: true, showArCristo2: false },
            { text: "Colecionei mais de 400 figuras de Cristo. Eram proteção do lar e presente especial.", showArCristo1: false, showArCristo2: true },
            { text: "Para que serviam originalmente os Cristos?", showArCristo1: false, showArCristo2: false },
            { text: "Os Cristos faziam parte do enxoval das noivas no Alentejo.", showArCristo1: false, showArCristo2: false },
            { text: "O homem que me vendeu este Cristo tinha fome. Fui à cozinha buscar-lhe algo.", showArCristo1: false, showArCristo2: false }
        ];

        let currentStep = 0;
        const dialogText = document.getElementById('ar-dialog-text');
        const arCristo1 = document.getElementById('ar-cristo-1');
        const arCristo2 = document.getElementById('ar-cristo-2');
        const overlay = document.getElementById('ar-overlay');
        const btnNext = document.getElementById('btn-proxima-sala');
        const btnPrev = document.getElementById('btn-prev-dialog');
        const btnAdvance = document.getElementById('btn-next-dialog');
        const pegadas = document.getElementById('html-pegadas');

        function updateUI() {
            if(currentStep >= telasFluxo.length) {
                overlay.style.display = 'none';
                btnNext.style.display = 'block';
                pegadas.style.display = 'block';
                return;
            }
            const data = telasFluxo[currentStep];
            dialogText.textContent = data.text;
            arCristo1.setAttribute('visible', data.showArCristo1);
            arCristo2.setAttribute('visible', data.showArCristo2);
        }

        btnAdvance.addEventListener('click', () => { currentStep++; updateUI(); });
        btnPrev.addEventListener('click', () => { if(currentStep > 0) currentStep--; updateUI(); });
        function concluirSala() { window.location.href = "revelacao.html"; }
        window.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
