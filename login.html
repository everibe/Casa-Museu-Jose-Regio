<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Régio Quest</title>
    <!-- Link para as regras visuais externas -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container card-layout">
        <!-- Parte Superior: Título -->
        <header class="header-section">
            <h1 class="title-brand">
                <span class="small-title">Casa-Museu</span>
                <span class="large-title">José<br>Régio</span>
            </h1>
        </header>

        <!-- Cartão creme inferior -->
        <main class="bottom-card">
            <!-- Campo de E-mail -->
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" placeholder="nome@exemplo.com" class="form-input" required>
            </div>

            <!-- Campo de Senha -->
            <div class="form-group">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" class="form-input" required>
            </div>

            <!-- Esqueceu sua senha? -->
            <div class="forgot-password-container">
                <a href="#" class="forgot-password-link">Esqueceu sua senha?</a>
            </div>

            <!-- Botões de Ação -->
            <div class="button-group" style="margin: 10px auto 0 auto;">
                <!-- Botão de Destaque Vermelho apontando para a página seguinte -->
                <a href="experiencia.html" class="btn btn-highlight" id="btn-login-submit">
                    Login
                </a>
                
                <!-- Botão Secundário Branco para criar nova conta -->
                <a href="registrar.html" class="btn btn-secondary" id="btn-signup">
                    Criar nova conta
                </a>
            </div>

            <!-- Divisor Social -->
            <div class="social-section">
                <span class="social-title">Ou continue com</span>
                <div class="social-buttons">
                    <!-- Google -->
                    <button class="btn-social" aria-label="Entrar com Google">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 5.92 1 1 5.92 1 12s4.92 11 11.24 11c6.6 0 11-4.65 11-11.2 0-.756-.08-1.33-.18-1.815H12.24z"/>
                        </svg>
                    </button>
                    <!-- Facebook -->
                    <button class="btn-social" aria-label="Entrar com Facebook">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 8H7v3h2v9h4v-9h3.625L17 8h-4V6.5c0-.9.5-1.3 1.25-1.3H17V2h-3.875C10.5 2 9 3.5 9 5.875V8z"/>
                        </svg>
                    </button>
                    <!-- Apple -->
                    <button class="btn-social" aria-label="Entrar com Apple">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.69-1.12 1.83-.98 2.94.1.08 1.15.12 2.81-1.33z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
