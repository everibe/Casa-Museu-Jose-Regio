<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personalizar Experiência - Régio Quest</title>
    <!-- Link para as regras visuais externas -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container" style="justify-content: center;">
        <main class="center-section" style="width: 100%; flex: none; padding: 0;">
            <!-- Título Superior -->
            <h1 class="age-title" id="experience-title">
                Selecione a sua idade para uma experiência personalizada
            </h1>

            <!-- Grelha de Seleção de Idade -->
            <div class="age-grid">
                <!-- Opção 1 -->
                <a href="percurso.html" class="btn-grid-card" id="age-btn-1">
                    <span>Tenho entre</span>
                    <strong>8-13 anos</strong>
                </a>

                <!-- Opção 2 -->
                <a href="percurso.html" class="btn-grid-card" id="age-btn-2">
                    <span>Tenho entre</span>
                    <strong>14-18 anos</strong>
                </a>

                <!-- Opção 3 -->
                <a href="percurso.html" class="btn-grid-card" id="age-btn-3">
                    <span>Tenho entre</span>
                    <strong>19-35 anos</strong>
                </a>

                <!-- Opção 4 -->
                <a href="percurso.html" class="btn-grid-card" id="age-btn-4">
                    <span>Tenho</span>
                    <strong>36+</strong>
                </a>
            </div>
        </main>
    </div>

</body>
</html>
